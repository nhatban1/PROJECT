<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Course List</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <h2>Danh sách môn học</h2>
    <a href="/pages/dashboard.html">Trang chủ</a>
    <form id="courseForm">
      <input id="courseId" placeholder="Mã môn" required />
      <input id="courseName" placeholder="Tên môn" required />
      <input id="credits" type="number" placeholder="Tín chỉ" required />
      <input id="teacherId" placeholder="Mã GV" required />
      <input id="semesterId" placeholder="Mã HK" required />
      <button type="submit">Thêm môn</button>
    </form>
    <table>
      <thead>
        <tr><th>Mã</th><th>Tên</th><th>Tín chỉ</th><th>Action</th></tr>
      </thead>
      <tbody id="courseBody"></tbody>
    </table>

    <script src="/js/config/api.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/pages/courses.js"></script>
  </body>
</html>
