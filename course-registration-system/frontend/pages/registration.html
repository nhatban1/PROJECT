<!DOCTYPE html>
<html lang="vi">
<head>

  <title>Registration</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <h2>Đăng ký môn học</h2>

    <input id="courseId" placeholder="Course ID" required />
    <input id="semesterId" placeholder="Semester ID" required />

    <thead><tr><th>Môn</th><th>HK</th><th>Trạng thái</th></tr></thead>
    <tbody id="registrationBody"></tbody>
  </table>

  <script src="/js/config/api.js"></script>
  <script src="/js/utils/auth.js"></script>
  <script src="/js/pages/registration.js"></script>

</html>
