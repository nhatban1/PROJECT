<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Học kỳ</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <h2>Quản lý học kỳ</h2>
    <a href="/pages/dashboard.html">Trang chủ</a>
    <form id="semesterForm">
      <input id="semesterId" placeholder="Mã học kỳ" required />
      <input id="name" placeholder="Tên học kỳ" required />
      <input id="startDate" type="date" required />
      <input id="endDate" type="date" required />
      <input id="registrationStart" type="date" required />
      <input id="registrationEnd" type="date" required />
      <input id="maxCredits" type="number" placeholder="Tín chỉ tối đa" required />
      <button type="submit">Thêm học kỳ</button>
    </form>
    <table>
      <thead>
        <tr><th>Mã</th><th>Tên</th><th>Trạng thái</th><th>Đăng ký</th></tr>
      </thead>
      <tbody id="semesterBody"></tbody>
    </table>

    <script src="/js/config/api.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/pages/semesters.js"></script>
  </body>
</html>
